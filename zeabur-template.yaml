apiVersion: zeabur.com/v1
kind: Template
metadata:
  name: emjudge
spec:
  description: Frontend assignment submission and auto-grading platform with Playwright testing
  icon: https://raw.githubusercontent.com/nicholaschiang/static/main/code-icon.svg
  coverImage: https://images.unsplash.com/photo-1516321318423-f06f85e504b3?w=1200
  tags:
    - Tool
    - Education
  variables:
    - key: PUBLIC_DOMAIN
      type: DOMAIN
      name: Domain
      description: The domain for your emjudge platform
    - key: JWT_SECRET
      type: STRING
      name: JWT Secret
      description: Secret key for JWT token signing (use a random string)
    - key: DEFAULT_ADMIN_PASSWORD
      type: STRING
      name: Admin Password
      description: Default password for the admin account
  readme: |-
    # emjudge

    Frontend assignment submission and auto-grading platform. Students upload HTML/CSS/JS or React assignments, and the system runs Playwright tests in isolated Docker environments to produce scores, test results, screenshots, and logs.

    ## Features

    - **Multiple assignment types**: Support for HTML/CSS/JS and React projects
    - **Automated grading**: Playwright-based testing with detailed results
    - **Class management**: Organize students into classes with teachers
    - **Score tracking**: Visual score history with charts
    - **File management**: MinIO-based file storage for submissions and artifacts

    ## Default Admin Account

    After deployment, login with:
    - Username: `admin`
    - Password: The password you set in `DEFAULT_ADMIN_PASSWORD`

    ## Important Notes

    - The Judge Worker requires Docker access and must be run separately on a machine with Docker installed
    - Run database migrations after first deployment: The API will auto-migrate on startup

    ## Worker Setup (External)

    The Judge Worker needs to run on a separate machine with Docker access:

    ```bash
    # Clone the repository
    git clone <your-repo>
    cd frontend-judge

    # Install dependencies
    pnpm install

    # Build the judge-runner image
    docker build -t judge-runner:latest docker/judge-runner/

    # Set environment variables
    export DATABASE_URL=<your-zeabur-postgres-url>
    export MINIO_ENDPOINT=<your-zeabur-minio-endpoint>
    export MINIO_PORT=443
    export MINIO_ACCESS_KEY=<your-minio-access-key>
    export MINIO_SECRET_KEY=<your-minio-secret-key>
    export MINIO_USE_SSL=true

    # Run the worker
    pnpm --filter @judge/worker build
    node apps/worker/dist/index.js
    ```

  services:
    - name: PostgreSQL
      icon: https://raw.githubusercontent.com/zeabur/service-icons/main/marketplace/postgresql.svg
      template: PREBUILT
      spec:
        source:
          image: postgres:16-alpine
        ports:
          - id: database
            port: 5432
            type: TCP
        volumes:
          - id: data
            dir: /var/lib/postgresql/data
        env:
          POSTGRES_USER:
            default: postgres
          POSTGRES_PASSWORD:
            default: ${PASSWORD}
          POSTGRES_DB:
            default: judge
          PGDATA:
            default: /var/lib/postgresql/data/pgdata
          POSTGRES_HOST:
            default: ${CONTAINER_HOSTNAME}
            expose: true
            readonly: true
          POSTGRES_PORT:
            default: "5432"
            expose: true
            readonly: true
          DATABASE_URL:
            default: postgresql://postgres:${PASSWORD}@${CONTAINER_HOSTNAME}:5432/judge
            expose: true
            readonly: true
        instructions:
          - type: PASSWORD
            title: PostgreSQL Password
            content: ${POSTGRES_PASSWORD}
            category: Credentials
          - type: TEXT
            title: Connection String
            content: ${DATABASE_URL}
            category: Connection

    - name: MinIO
      icon: https://raw.githubusercontent.com/zeabur/service-icons/main/marketplace/minio.svg
      template: PREBUILT
      spec:
        source:
          image: minio/minio:latest
          command:
            - server
            - /data
            - --console-address
            - ":9001"
        ports:
          - id: api
            port: 9000
            type: HTTP
          - id: console
            port: 9001
            type: HTTP
        volumes:
          - id: data
            dir: /data
        env:
          MINIO_ROOT_USER:
            default: minioadmin
          MINIO_ROOT_PASSWORD:
            default: ${PASSWORD}
          MINIO_HOST:
            default: ${CONTAINER_HOSTNAME}
            expose: true
            readonly: true
          MINIO_PORT:
            default: "9000"
            expose: true
            readonly: true
          MINIO_ACCESS_KEY:
            default: ${MINIO_ROOT_USER}
            expose: true
            readonly: true
          MINIO_SECRET_KEY:
            default: ${MINIO_ROOT_PASSWORD}
            expose: true
            readonly: true
        instructions:
          - type: TEXT
            title: MinIO Console
            content: Access the MinIO console on port 9001
            category: Access
          - type: TEXT
            title: Access Key
            content: ${MINIO_ROOT_USER}
            category: Credentials
          - type: PASSWORD
            title: Secret Key
            content: ${MINIO_ROOT_PASSWORD}
            category: Credentials

    - name: API
      icon: https://raw.githubusercontent.com/zeabur/service-icons/main/marketplace/node.svg
      template: GIT
      domainKey: PUBLIC_DOMAIN
      dependencies:
        - PostgreSQL
        - MinIO
      spec:
        source:
          type: GITHUB
          repoID: 1183262376
          branch: main
        ports:
          - id: web
            port: 3000
            type: HTTP
        env:
          PORT:
            default: "3000"
          HOST:
            default: "0.0.0.0"
          DATABASE_URL:
            default: ${DATABASE_URL}
          JWT_SECRET:
            default: ${JWT_SECRET}
          JWT_EXPIRES_IN:
            default: "7d"
          CORS_ORIGIN:
            default: "*"
          DEFAULT_ADMIN_PASSWORD:
            default: ${DEFAULT_ADMIN_PASSWORD}
          MINIO_ENDPOINT:
            default: ${MINIO_HOST}
          MINIO_PORT:
            default: ${MINIO_PORT}
          MINIO_ACCESS_KEY:
            default: ${MINIO_ACCESS_KEY}
          MINIO_SECRET_KEY:
            default: ${MINIO_SECRET_KEY}
          MINIO_USE_SSL:
            default: "false"
          ZBPACK_BUILD_COMMAND:
            default: pnpm install && pnpm --filter @judge/shared build && pnpm --filter @judge/api build && pnpm --filter @judge/api db:migrate && pnpm --filter @judge/api db:seed
          ZBPACK_START_COMMAND:
            default: node apps/api/dist/index.js

localization:
  zh-TW:
    description: 前端作業繳交與自動評測平台，支援 Playwright 測試
    variables:
      - key: PUBLIC_DOMAIN
        type: DOMAIN
        name: 網域
        description: 你想將 emjudge 綁定到哪個網域？
      - key: JWT_SECRET
        type: STRING
        name: JWT 密鑰
        description: JWT 簽名用的密鑰（請使用隨機字串）
      - key: DEFAULT_ADMIN_PASSWORD
        type: STRING
        name: 管理員密碼
        description: 預設管理員帳號的密碼
    readme: |-
      # emjudge

      前端作業繳交與自動評測平台。學生上傳 HTML/CSS/JS 或 React 作業，系統在隔離的 Docker 環境中用 Playwright 執行測試，產出分數、測試結果、截圖與 log。

      ## 功能特色

      - **多種作業類型**：支援 HTML/CSS/JS 和 React 專案
      - **自動評測**：基於 Playwright 的測試，提供詳細結果
      - **班級管理**：將學生組織成班級，由老師管理
      - **成績追蹤**：圖表化的成績歷史記錄
      - **檔案管理**：基於 MinIO 的檔案儲存系統

      ## 預設管理員帳號

      部署完成後，使用以下帳號登入：
      - 帳號：`admin`
      - 密碼：你在 `DEFAULT_ADMIN_PASSWORD` 設定的密碼

      ## 重要說明

      - Judge Worker 需要 Docker 環境，必須在有 Docker 的機器上另外運行
      - 資料庫 migration 會在 API 啟動時自動執行

      ## Worker 設定（外部機器）

      Judge Worker 需要在有 Docker 的外部機器上運行：

      ```bash
      # Clone 專案
      git clone <your-repo>
      cd frontend-judge

      # 安裝依賴
      pnpm install

      # 建置 judge-runner 映像
      docker build -t judge-runner:latest docker/judge-runner/

      # 設定環境變數
      export DATABASE_URL=<your-zeabur-postgres-url>
      export MINIO_ENDPOINT=<your-zeabur-minio-endpoint>
      export MINIO_PORT=443
      export MINIO_ACCESS_KEY=<your-minio-access-key>
      export MINIO_SECRET_KEY=<your-minio-secret-key>
      export MINIO_USE_SSL=true

      # 運行 worker
      pnpm --filter @judge/worker build
      node apps/worker/dist/index.js
      ```
