apiVersion: zeabur.com/v1
kind: Template
metadata:
  name: emjudge
spec:
  description: Frontend assignment submission and auto-grading platform with Playwright testing
  icon: 
  coverImage: 
  tags:
    - Tool
    - Education
  variables:
    - key: PUBLIC_DOMAIN
      type: DOMAIN
      name: Domain
      description: The domain for your emjudge platform
    - key: JWT_SECRET
      type: STRING
      name: JWT Secret
      description: Secret key for JWT token signing (use a random string)
    - key: DEFAULT_ADMIN_PASSWORD
      type: STRING
      name: Admin Password
      description: Default password for the admin account
  readme: |-
    # emjudge

    Frontend assignment submission and auto-grading platform. Students upload HTML/CSS/JS or React assignments, and the system runs Playwright tests in isolated Docker environments to produce scores, test results, screenshots, and logs.

    ## Features

    - **Multiple assignment types**: Support for HTML/CSS/JS and React projects
    - **Automated grading**: Playwright-based testing with detailed results
    - **Class management**: Organize students into classes with teachers
    - **Score tracking**: Visual score history with charts
    - **File management**: MinIO-based file storage for submissions and artifacts

    ## Services

    | Service    | Description |
    |------------|-------------|
    | PostgreSQL  | Database for all application data |
    | MinIO       | Object storage for submissions and artifacts |
    | API         | Fastify REST API backend (port 3000) |
    | Web         | React SPA built and served as static files (port 3001) |
    | Caddy       | Reverse proxy: routes `/api/*` to API, everything else to Web |

    ## Default Admin Account

    After deployment, login with:
    - Username: `admin`
    - Password: The password you set in `DEFAULT_ADMIN_PASSWORD`

    ## Important Notes

    - The Judge Worker requires Docker access and must be run separately on a machine with Docker installed
    - Database migrations run automatically when the API starts

    ## Worker Setup (External Machine)

    The Judge Worker polls the database for jobs. It requires outbound access to PostgreSQL and MinIO — no inbound ports needed.

    ### 1. Get the PostgreSQL external connection string

    Port forwarding is enabled automatically. In the Zeabur Dashboard, go to the **PostgreSQL** service → **Instructions** → copy the **Connection String (external, for Worker)** value.

    ### 2. Expose MinIO for external access

    In the Zeabur Dashboard, go to the **MinIO** service → **Domains** tab → bind a domain (e.g. `minio.yourdomain.com`). This exposes MinIO's API over HTTPS on port 443.

    ### 3. Run the worker

    ```bash
    # Clone the repository
    git clone <your-repo>
    cd frontend-judge

    # Install dependencies
    pnpm install

    # Build the judge-runner image (required once, or after updates)
    docker build -t judge-runner:latest docker/judge-runner/

    # Build the worker
    pnpm --filter @judge/shared build
    pnpm --filter @judge/worker build

    # Set environment variables and start
    export DATABASE_URL=postgresql://root:<password>@hkg1.clusters.zeabur.com:<port>/zeabur
    export MINIO_ENDPOINT=minio.yourdomain.com
    export MINIO_PORT=443
    export MINIO_ACCESS_KEY=minio
    export MINIO_SECRET_KEY=<your-minio-secret>
    export MINIO_USE_SSL=true
    node apps/worker/dist/index.js
    ```

    The worker will connect to the remote database, poll for pending judge jobs, run them in local Docker containers, and upload artifacts back to MinIO.

  services:
    - name: PostgreSQL
      icon: https://cdn.zeabur.com/marketplace/postgresql.svg
      template: PREBUILT
      spec:
        source:
          image: postgres:18
          command:
            - docker-entrypoint.sh
            - -c
            - config_file=/etc/postgresql/postgresql.conf
        ports:
          - id: database
            port: 5432
            type: TCP
        volumes:
          - id: data
            dir: /var/lib/postgresql/18/docker
        env:
          PGDATA:
            default: /var/lib/postgresql/18/docker/pgdata
          POSTGRES_CONNECTION_STRING:
            default: postgresql://${POSTGRES_USERNAME}:${POSTGRES_PASSWORD}@${POSTGRES_HOST}:${POSTGRES_PORT}/${POSTGRES_DATABASE}
            expose: true
          POSTGRES_DATABASE:
            default: ${POSTGRES_DB}
            expose: true
          POSTGRES_DB:
            default: zeabur
          POSTGRES_HOST:
            default: ${CONTAINER_HOSTNAME}
            expose: true
          POSTGRES_PASSWORD:
            default: ${PASSWORD}
            expose: true
          POSTGRES_PORT:
            default: ${DATABASE_PORT}
            expose: true
          POSTGRES_URI:
            default: ${POSTGRES_CONNECTION_STRING}
            expose: true
          POSTGRES_USER:
            default: root
          POSTGRES_USERNAME:
            default: ${POSTGRES_USER}
            expose: true
        instructions:
          - title: Connection String
            content: postgresql://${POSTGRES_USERNAME}:${POSTGRES_PASSWORD}@${PORT_FORWARDED_HOSTNAME}:${DATABASE_PORT_FORWARDED_PORT}/${POSTGRES_DATABASE}
          - title: PostgreSQL Connect Command
            content: psql "postgresql://${POSTGRES_USERNAME}:${POSTGRES_PASSWORD}@${PORT_FORWARDED_HOSTNAME}:${DATABASE_PORT_FORWARDED_PORT}/${POSTGRES_DATABASE}"
          - title: PostgreSQL username
            content: ${POSTGRES_USERNAME}
          - title: PostgreSQL password
            content: ${POSTGRES_PASSWORD}
          - title: PostgreSQL database
            content: ${POSTGRES_DATABASE}
          - title: PostgreSQL host
            content: ${PORT_FORWARDED_HOSTNAME}
          - title: PostgreSQL port
            content: ${DATABASE_PORT_FORWARDED_PORT}
        configs:
          - path: /etc/postgresql/postgresql.conf
            template: |
              listen_addresses = '*'
              max_connections = 256
              shared_buffers = 256MB
              dynamic_shared_memory_type = posix
              max_wal_size = 1GB
              min_wal_size = 80MB
              log_timezone = 'UTC'
              datestyle = 'iso, mdy'
              timezone = 'UTC'
              lc_messages = 'en_US.UTF-8'
              lc_monetary = 'en_US.UTF-8'
              lc_numeric = 'en_US.UTF-8'
              lc_time = 'en_US.UTF-8'
              default_text_search_config = 'pg_catalog.english'

    - name: MinIO
      icon: https://cdn.zeabur.com/marketplace/minio.svg
      template: PREBUILT
      spec:
        source:
          image: quay.io/minio/minio:latest
          command:
            - /bin/sh
          args:
            - -c
            - |
              minio server /data --console-address :9090 &
              MINIO_PID=$!
              while ! curl -s http://localhost:9000/minio/health/live; do
                echo 'Waiting for MinIO to start...'
                sleep 1
              done
              sleep 5
              mc alias set myminio http://localhost:9000 $MINIO_USERNAME $MINIO_PASSWORD
              mc mb myminio/submissions || true
              mc mb myminio/artifacts || true
              wait $MINIO_PID
        ports:
          - id: web
            port: 9000
            type: HTTP
          - id: console
            port: 9090
            type: HTTP
        volumes:
          - id: data
            dir: /data
        env:
          MINIO_BROWSER_REDIRECT:
            default: "false"
          MINIO_HOST:
            default: ${CONTAINER_HOSTNAME}
            expose: true
          MINIO_PASSWORD:
            default: ${MINIO_ROOT_PASSWORD}
            expose: true
          MINIO_PORT:
            default: "9000"
            expose: true
          MINIO_ROOT_PASSWORD:
            default: ${PASSWORD}
          MINIO_ROOT_USER:
            default: minio
          MINIO_USERNAME:
            default: ${MINIO_ROOT_USER}
            expose: true
        instructions:
          - title: Access Key (Username)
            content: ${MINIO_USERNAME}
          - title: Secret Key (Password)
            content: ${MINIO_PASSWORD}

    - name: API
      icon: https://service-icons.zeabur.com/git/nodejs/default.svg
      template: GIT
      dependencies:
        - PostgreSQL
        - MinIO
      spec:
        source:
          source: GITHUB
          repo: 1183262376
          branch: main
        ports:
          - id: web
            port: 3000
            type: HTTP
        env:
          PORT:
            default: "3000"
          HOST:
            default: "0.0.0.0"
          DATABASE_URL:
            default: ${POSTGRES_CONNECTION_STRING}
          JWT_SECRET:
            default: ${JWT_SECRET}
          JWT_EXPIRES_IN:
            default: "7d"
          CORS_ORIGIN:
            default: https://${PUBLIC_DOMAIN}
          DEFAULT_ADMIN_PASSWORD:
            default: ${DEFAULT_ADMIN_PASSWORD}
          MINIO_ENDPOINT:
            default: ${MINIO_HOST}
          MINIO_PORT:
            default: ${MINIO_PORT}
          MINIO_ACCESS_KEY:
            default: ${MINIO_USERNAME}
          MINIO_SECRET_KEY:
            default: ${MINIO_PASSWORD}
          MINIO_USE_SSL:
            default: "false"
          ZBPACK_BUILD_COMMAND:
            default: pnpm --filter @judge/api build && pnpm --filter @judge/api db:migrate && pnpm --filter @judge/api db:seed
          ZBPACK_START_COMMAND:
            default: node apps/api/dist/index.js
          API_HOST:
            default: ${CONTAINER_HOSTNAME}
            expose: true
            readonly: true
          API_PORT:
            default: "3000"
            expose: true
            readonly: true

    - name: Web
      icon: https://service-icons.zeabur.com/git/nodejs/default.svg
      template: GIT
      dependencies:
        - API
      spec:
        source:
          source: GITHUB
          repo: 1183262376
          branch: main
        ports:
          - id: web
            port: 3001
            type: HTTP
        env:
          PORT:
            default: "3001"
          WEB_HOST:
            default: ${CONTAINER_HOSTNAME}
            expose: true
            readonly: true
          WEB_PORT:
            default: "3001"
            expose: true
            readonly: true
          ZBPACK_BUILD_COMMAND:
            default: pnpm --filter @judge/web build && pnpm add serve
          ZBPACK_START_COMMAND:
            default: pnpm serve -s apps/web/dist -l 3001

    - name: Caddy
      icon: https://cdn.zeabur.com/caddy.png
      template: PREBUILT
      domainKey: PUBLIC_DOMAIN
      dependencies:
        - Web
        - API
      spec:
        source:
          image: caddy:2-alpine
        ports:
          - id: web
            port: 80
            type: HTTP
        configs:
          - path: /etc/caddy/Caddyfile
            template: |
              {
                servers {
                  trusted_proxies static private_ranges
                  trusted_proxies_strict
                  client_ip_headers X-Forwarded-For X-Real-IP
                }
              }

              :80 {
                log
                encode

                handle /api/* {
                  reverse_proxy ${API_HOST}:${API_PORT}
                }

                handle {
                  reverse_proxy ${WEB_HOST}:${WEB_PORT}
                }
              }
            envsubst: true

localization:
  zh-TW:
    description: 前端作業繳交與自動評測平台，支援 Playwright 測試
    variables:
      - key: PUBLIC_DOMAIN
        type: DOMAIN
        name: 網域
        description: 你想將 emjudge 綁定到哪個網域？
      - key: JWT_SECRET
        type: STRING
        name: JWT 密鑰
        description: JWT 簽名用的密鑰（請使用隨機字串）
      - key: DEFAULT_ADMIN_PASSWORD
        type: STRING
        name: 管理員密碼
        description: 預設管理員帳號的密碼
    readme: |-
      # emjudge

      前端作業繳交與自動評測平台。學生上傳 HTML/CSS/JS 或 React 作業，系統在隔離的 Docker 環境中用 Playwright 執行測試，產出分數、測試結果、截圖與 log。

      ## 功能特色

      - **多種作業類型**：支援 HTML/CSS/JS 和 React 專案
      - **自動評測**：基於 Playwright 的測試，提供詳細結果
      - **班級管理**：將學生組織成班級，由老師管理
      - **成績追蹤**：圖表化的成績歷史記錄
      - **檔案管理**：基於 MinIO 的檔案儲存系統

      ## 服務架構

      | 服務       | 說明 |
      |-----------|------|
      | PostgreSQL | 儲存所有應用程式資料 |
      | MinIO      | 儲存繳交的作業與評測產物 |
      | API        | Fastify REST API 後端（port 3000） |
      | Web        | React SPA 建置後以靜態檔案服務（port 3001） |
      | Caddy      | Reverse proxy：`/api/*` 轉發到 API，其餘轉發到 Web |

      ## 預設管理員帳號

      部署完成後，使用以下帳號登入：
      - 帳號：`admin`
      - 密碼：你在 `DEFAULT_ADMIN_PASSWORD` 設定的密碼

      ## 重要說明

      - Judge Worker 需要 Docker 環境，必須在有 Docker 的機器上另外運行
      - 資料庫 migration 會在 API 啟動時自動執行

      ## Worker 設定（外部機器）

      Worker 使用輪詢方式從資料庫取得 job，只需要**對外連出**到 PostgreSQL 和 MinIO，不需要開放任何入站 port。

      ### 1. 取得 PostgreSQL 外部連線字串

      Port Forwarding 會自動啟用。在 Zeabur Dashboard 的 **PostgreSQL** 服務 → **Instructions** → 複製 **Connection String (external, for Worker)** 的值。

      ### 2. 開放 MinIO 外部連線

      在 Zeabur Dashboard 的 **MinIO** 服務 → **Domains** 分頁 → 綁定一個 domain（例如 `minio.yourdomain.com`），讓 MinIO API 透過 HTTPS port 443 對外開放。

      ### 3. 啟動 Worker

      ```bash
      # Clone 專案
      git clone <your-repo>
      cd frontend-judge

      # 安裝依賴
      pnpm install

      # 建置 judge-runner 映像（第一次或更新後執行）
      docker build -t judge-runner:latest docker/judge-runner/

      # 建置 worker
      pnpm --filter @judge/shared build
      pnpm --filter @judge/worker build

      # 設定環境變數並啟動
      export DATABASE_URL=postgresql://root:<password>@hkg1.clusters.zeabur.com:<port>/zeabur
      export MINIO_ENDPOINT=minio.yourdomain.com
      export MINIO_PORT=443
      export MINIO_ACCESS_KEY=minio
      export MINIO_SECRET_KEY=<your-minio-secret>
      export MINIO_USE_SSL=true
      node apps/worker/dist/index.js
      ```

      Worker 啟動後會連上遠端資料庫，持續輪詢待評測的 job，在本機 Docker 中執行，再將結果和 artifacts 上傳回 MinIO。
